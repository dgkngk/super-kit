description = "Workspace onboarding — scan project, read docs, Q&A gaps, write .agents/context/ files"

prompt = '''
Use the `kit_setup` MCP tool to onboard this workspace.

Call `kit_setup({ action: "start", projectPath: "." })` to begin.

The tool will:
1. Scan the file tree and categorize all project files
2. Read README, ARCHITECTURE, package manifests, and agent context files
3. Detect any legacy context files (.docs/, docs/agents/) that need migration
4. Return a draft context and question queue for Phase 4 Q&A

After answering any clarification questions, call:
  `kit_setup({ action: "resume", projectPath: "." })`

To check whether context files are stale, call:
  `kit_setup({ action: "status", projectPath: "." })`

All context files are written to `.agents/context/` in the project root.
'''
